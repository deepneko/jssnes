<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSSNES - JavaScript SNES Emulator</title>
    <style>
        body { font-family: monospace; background: #333; color: #fff; text-align: center; }
        canvas { border: 2px solid #fff; image-rendering: pixelated; width: 512px; height: 448px; background: #000; }
        #controls { margin: 20px; }
    </style>
</head>
<body>
    <h1>JSSNES</h1>
    <div id="controls">
        <input type="file" id="romInput" accept=".sfc,.smc">
        <button id="resetBtn">Reset</button>
        <button id="pauseBtn">Pause</button>
    </div>
    <div id="screen-container">
        <canvas id="screen" width="256" height="224"></canvas>
    </div>
    <div id="debug"></div>

    <script type="module" src="./src/main.js?v=24"></script>
</body>
</html>
