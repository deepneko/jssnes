<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shoulder buttons -->
  <path d="M10 17 L24 17 L22 21 L10 21 Z" fill="#5a5a5e"/>
  <path d="M54 17 L40 17 L42 21 L54 21 Z" fill="#5a5a5e"/>

  <!-- Body -->
  <rect x="3" y="17" width="58" height="32" rx="7" fill="#eceaec" stroke="#b8b5ba" stroke-width="1"/>

  <!-- D-pad recessed disc -->
  <circle cx="18" cy="34" r="11.5" fill="#dad7da"/>
  <g fill="#3c3a3e">
    <rect x="14.7" y="27.5" width="6.6" height="13" rx="1.6"/>
    <rect x="11.5" y="30.7" width="13" height="6.6" rx="1.6"/>
  </g>
  <circle cx="18" cy="34" r="1.3" fill="#5a5860"/>

  <!-- Face-button recessed disc -->
  <circle cx="47" cy="34" r="12.5" fill="#dad7da"/>

  <!-- Face buttons (diamond layout: X top/blue, Y left/green, A right/red, B bottom/yellow) -->
  <circle cx="47" cy="27.3" r="3.4" fill="#3f8fd6"/>
  <circle cx="40.3" cy="34" r="3.4" fill="#5cb85c"/>
  <circle cx="53.7" cy="34" r="3.4" fill="#dd4b4b"/>
  <circle cx="47" cy="40.7" r="3.4" fill="#f2c12e"/>

  <!-- Select / Start (drawn last so they sit on top) -->
  <rect x="25.8" y="38" width="6.4" height="3" rx="1.5" fill="#9a979c" transform="rotate(-25 29 39.5)"/>
  <rect x="32.4" y="38" width="6.4" height="3" rx="1.5" fill="#9a979c" transform="rotate(-25 35.6 39.5)"/>
</svg>
